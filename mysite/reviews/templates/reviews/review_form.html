{% extends 'main/base.html' %}
{% load i18n %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="fw-bold mb-4">{% trans "Redaguoti atsiliepimą" %}</h3>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label" for="id_rating">{{ form.rating.label }}</label>
                            {{ form.rating }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="id_content">{{ form.content.label }}</label>
                            {{ form.content }}
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">{% trans "Išsaugoti" %}</button>
                            <a href="{% url 'reviews_list' %}" class="btn btn-outline-secondary">{% trans "Atšaukti" %}</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
