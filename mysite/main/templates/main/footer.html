<footer class="footer-glass mt-5 py-3">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">

        <div class="text-muted small">
            © {{ now|date:"Y" }} FinPro. Visi teisės saugomos.
        </div>

        <div class="d-flex gap-3 small">
            {% if user.is_authenticated %}
                {% if user.profile.role == 'client' %}
                    <a href="/orders/client/" class="footer-link">Mano paskyra</a>
                {% endif %}
                {% if user.profile.role == 'manager' %}
                    <a href="/orders/manager/" class="footer-link">Vadibininko panelė</a>
                {% endif %}
                <a href="/orders/list/" class="footer-link">Užsakymai</a>
            {% else %}
                <a href="/login/" class="footer-link">Prisijungti</a>
            {% endif %}
        </div>

    </div>
</footer>
