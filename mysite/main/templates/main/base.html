{% load static %}
{% load i18n %}
{% get_current_language as CURRENT_LANGUAGE %}

<!DOCTYPE html>
<html lang="{{ CURRENT_LANGUAGE|default:'lt' }}">
<head>
    <meta charset="UTF-8">
    <title>FinPro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles -->
    <link rel="stylesheet" href="{% static 'main/css/styles.css' %}">
</head>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const toastElList = [].slice.call(document.querySelectorAll('.toast'))
        toastElList.map(function (toastEl) {
            const t = new bootstrap.Toast(toastEl)
            t.show()
        })
    })
</script>

<body class="site-shell">

    {% include 'main/navbar.html' %}

    {% if messages %}
<div aria-live="polite" aria-atomic="true" class="position-relative">
    <div class="toast-container position-fixed top-0 end-0 p-3">

        {% for message in messages %}
        <div class="toast align-items-center text-bg-{{ message.tags }} border-0 show mb-2" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    {{ message }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"></button>
            </div>
        </div>
        {% endfor %}

    </div>
</div>
{% endif %}


    <main class="site-main">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'main/footer.html' %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            const THEME_KEY = 'finpro-theme';

            function applyTheme(theme) {
                const body = document.body;
                const toggleBtn = document.getElementById('themeToggle');
                const isNight = theme === 'night';

                body.classList.toggle('theme-night', isNight);
                if (toggleBtn) {
                    toggleBtn.textContent = isNight ? '☀️' : '🌙';
                }
            }

            function resolveInitialTheme() {
                const savedTheme = localStorage.getItem(THEME_KEY);
                if (savedTheme === 'day' || savedTheme === 'night') {
                    return savedTheme;
                }
                return 'day';
            }

            document.addEventListener('DOMContentLoaded', function () {
                let currentTheme = resolveInitialTheme();
                applyTheme(currentTheme);

                const toggleBtn = document.getElementById('themeToggle');
                if (toggleBtn) {
                    toggleBtn.addEventListener('click', function () {
                        currentTheme = currentTheme === 'night' ? 'day' : 'night';
                        localStorage.setItem(THEME_KEY, currentTheme);
                        applyTheme(currentTheme);
                    });
                }
            });
        })();
    </script>
</body>
</html>
