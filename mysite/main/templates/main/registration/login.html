{% extends 'main/base.html' %}
{% load static %}
{% load i18n %}

{% block content %}
<div class="auth-bg d-flex align-items-center justify-content-center">

    <div class="glass-card p-4" style="width: 420px;">

        <h2 class="fw-bold text-center mb-4">{% trans "Prisijungimas" %}</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold"><i class="bi bi-person me-2"></i>{% trans "Vartotojo vardas" %}</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="{% trans 'Įveskite vartotojo vardą' %}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold"><i class="bi bi-lock me-2"></i>{% trans "Slaptažodis" %}</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="{% trans 'Įveskite slaptažodį' %}" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg mt-3">
                {% trans "Prisijungti" %}
            </button>

        </form>

        <p class="text-center mt-3">
            {% trans "Neturi paskyros?" %}
            <a href="/register/" class="fw-semibold">{% trans "Registruokis" %}</a>
        </p>

    </div>

</div>
{% endblock %}
