{% extends "base.html" %}

{% block title %}Set new password{% endblock %}

{% block content %}
<div class="auth-card">
    <h2>Set new password</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-primary">Save</button>
    </form>
</div>
{% endblock %}
