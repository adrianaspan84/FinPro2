{% extends "base.html" %}

{% block title %}Reset password{% endblock %}

{% block content %}
<div class="auth-card">
    <h2>Reset password</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-primary">Send reset link</button>
    </form>
</div>
{% endblock %}
