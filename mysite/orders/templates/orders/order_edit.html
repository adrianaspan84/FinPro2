{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-4">

    <h2>Redaguoti užsakymą #{{ order.id }}</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Terminas</label>
            {{ form.deadline }}
        </div>

        <div class="mb-3">
            <label>Statusas</label>
            {{ form.status }}
        </div>

        {% if form.manager %}
        <div class="mb-3">
            <label>Vadibininkas</label>
            {{ form.manager }}
        </div>
        {% endif %}

        <button type="submit" class="btn btn-primary">Išsaugoti</button>
        <a href="{% url 'order_detail' order.id %}" class="btn btn-secondary">Atgal</a>
    </form>

</div>
{% endblock %}
